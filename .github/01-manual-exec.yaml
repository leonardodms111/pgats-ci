# Ci de Nivel 01 - Disparo manial atraves de clique

#nome da pipeline
name: 'Execução Manual'

# gatilhos / triggres - regras de disparo
# gatilho manual = workflow_dispatch
on:
  workflow_dispatch:
  
  # tarefas dentro da pipeline = jobs

jobs:
  
  # nome do job
  e2e-tests:
    
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
        # clone do projeto
      - uses: actions/checkout@v4

        # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

        # instalação do Yarn
      - name: Install Yarn
        run: npm install -g yarn

        # Instalação das dependências
      - name: Instalando dependências
        run: yarn

        # Instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install


        # Execução dos testes E2E
      - name: Executando testes E2E
        run: yarn run e2e
